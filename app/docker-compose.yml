services:
  mysql:
    image: mysql:8.0
    container_name: operal-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: operal
      MYSQL_USER: operal
      MYSQL_PASSWORD: operal_dev_pw
      MYSQL_ROOT_PASSWORD: root_dev_pw
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
